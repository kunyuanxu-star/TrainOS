# ─────────────────────────────────────────────────────────────────────────────
# TrainOS — CNB Cloud-Native Development Configuration
# ─────────────────────────────────────────────────────────────────────────────
# RISC-V 64-bit Microkernel OS in Rust (no_std)
# Runtime: RustSBI (M-mode) + QEMU (RISC-V -machine virt)
# ─────────────────────────────────────────────────────────────────────────────

# ═════════════════════════════════════════════════════════════════════════════
# Cloud IDE Workspace (页面中手动启动远程开发)
# ═════════════════════════════════════════════════════════════════════════════
$:
  vscode:
    - docker:
        # 自定义镜像: Rust nightly + RISC-V toolchain
        build:
          dockerfile: .ide/Dockerfile
          versionBy:
            - .ide/Dockerfile
            - .cnb.yml
      services:
        - vscode
        - docker
      stages:
        - name: 验证 RISC-V Rust 工具链
          script: |
            echo "========== RISC-V Rust 工具链 =========="
            rustup show
            rustc --version
            cargo --version
            echo ""
            echo "========== RISC-V 目标 =========="
            rustup target list | grep installed
            echo ""
            echo "========== QEMU =========="
            qemu-system-riscv64 --version 2>/dev/null || echo "QEMU installed"

        - name: 构建 TrainOS
          script: |
            echo "========== 开始构建 TrainOS =========="
            cd /workspace
            make all 2>&1
            echo ""
            echo "========== 构建完成 =========="
            ls -lh target/riscv64gc-unknown-none-elf/release/kernel

        - name: 运行测试
          script: |
            echo "========== 运行 TrainOS 测试 =========="
            cd /workspace
            if [ -f Makefile ] && grep -q "^test:" Makefile; then
              make test 2>&1 | tail -20
            else
              echo "测试命令不可用，跳过"
            fi

# ═════════════════════════════════════════════════════════════════════════════
# 所有分支 — 创建分支时自动创建开发环境
# ═════════════════════════════════════════════════════════════════════════════
(**):
  branch.create:
    - name: TrainOS 开发环境
      services:
        - vscode
        - docker
      docker:
        build:
          dockerfile: .ide/Dockerfile
      stages:
        - name: 初始化开发环境
          script: |
            echo "=========================================="
            echo "  TrainOS Cloud-Native Dev Environment"
            echo "  Repository: ${CNB_REPO_SLUG:-TrainOS}"
            echo "  Branch:     ${CNB_BRANCH:-unknown}"
            echo "=========================================="
            echo ""
            echo "已就绪的工具链:"
            rustc --version
            cargo --version
            rustup target list | grep riscv
            echo ""
            echo "快速开始:"
            echo "  make all     — 构建所有服务和内核"
            echo "  make test    — 运行测试"
            echo "  make run     — 在 QEMU 上运行"
            echo "=========================================="
