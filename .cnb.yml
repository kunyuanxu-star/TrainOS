# ─────────────────────────────────────────────────────────────────────────────
# TrainOS — CNB Cloud-Native Development Configuration
# ─────────────────────────────────────────────────────────────────────────────
# RISC-V 64-bit Microkernel OS in Rust (no_std)
# Runtime: RustSBI (M-mode) + QEMU (RISC-V -machine virt)
# ─────────────────────────────────────────────────────────────────────────────

# ═════════════════════════════════════════════════════════════════════════════
# Cloud IDE Workspace (页面中启动远程开发)
# ═════════════════════════════════════════════════════════════════════════════
$:
  vscode:
    - docker:
        # 使用自定义镜像作为开发环境 (Rust nightly + RISC-V toolchain)
        build:
          dockerfile: .ide/Dockerfile
          versionBy:
            - .ide/Dockerfile
            - .cnb.yml
      services:
        - vscode
        - docker
      stages:
        # Stage 1: 验证工具链
        - name: 验证 RISC-V Rust 工具链
          script: |
            echo "========== RISC-V Rust 工具链 =========="
            rustup show
            rustc --version
            cargo --version
            echo ""
            echo "========== RISC-V 目标 =========="
            rustup target list | grep installed
            echo ""
            echo "========== QEMU =========="
            qemu-system-riscv64 --version 2>/dev/null || echo "QEMU installed"
            echo ""

        # Stage 2: 构建所有服务 + 内核
        - name: 构建 TrainOS (make all)
          script: |
            echo "========== 开始构建 TrainOS =========="
            cd /workspace
            make all 2>&1
            echo ""
            echo "========== 构建完成 =========="
            ls -lh target/riscv64gc-unknown-none-elf/release/kernel

        # Stage 3: 运行测试
        - name: 运行自测 (make test)
          script: |
            echo "========== 运行 TrainOS 测试 =========="
            cd /workspace
            if [ -f Makefile ] && grep -q "^test:" Makefile; then
              make test 2>&1 | tail -20
            else
              echo "测试命令不可用，跳过"
            fi

# ═════════════════════════════════════════════════════════════════════════════
# 主分支 — Push 事件触发 CI 构建
# ═════════════════════════════════════════════════════════════════════════════
main:
  push:
    # Pipeline 1: 构建
    - docker:
        build:
          dockerfile: .ide/Dockerfile
      stages:
        - name: TrainOS 完整构建
          script: |
            set -e
            echo "=========================================="
            echo "  TrainOS CI Build"
            echo "  Branch: main"
            echo "  Commit: ${CNB_COMMIT_SHORT:-unknown}"
            echo "=========================================="
            cd /workspace
            make all
            echo ""
            echo "========== 构建产物 =========="
            ls -lh target/riscv64gc-unknown-none-elf/release/kernel
            echo "Build OK"

        - name: 内核自测
          script: |
            set -e
            cd /workspace
            if [ -f Makefile ] && grep -q "^test:" Makefile; then
              timeout 120 make test 2>&1 || echo "Test timeout/error (expected in CI)"
            fi

    # Pipeline 2: 代码检查
    - docker:
        build:
          dockerfile: .ide/Dockerfile
      stages:
        - name: Clippy 静态检查
          script: |
            cd /workspace
            cargo clippy -p kernel 2>&1 | head -50 || true

        - name: Cargo fmt 格式检查
          script: |
            cd /workspace
            cargo fmt --check 2>&1 || echo "格式检查完成（允许不通过）"

# ═════════════════════════════════════════════════════════════════════════════
# Pull Request — 构建 + 测试
# ═════════════════════════════════════════════════════════════════════════════
pull_request:
  push:
    - docker:
        build:
          dockerfile: .ide/Dockerfile
      stages:
        - name: PR 构建验证
          script: |
            set -e
            cd /workspace
            make all
            echo "PR Build OK — $(date)"

# ═════════════════════════════════════════════════════════════════════════════
# 所有分支 — 创建分支时自动创建开发环境
# ═════════════════════════════════════════════════════════════════════════════
(**):
  branch.create:
    - name: TrainOS 开发环境
      services:
        - vscode
        - docker
      docker:
        build:
          dockerfile: .ide/Dockerfile
      stages:
        - name: 初始化开发环境
          script: |
            echo "=========================================="
            echo "  TrainOS Cloud-Native Dev Environment"
            echo "  Repository: ${CNB_REPO_SLUG:-TrainOS}"
            echo "  Branch:     ${CNB_BRANCH:-unknown}"
            echo "=========================================="
            echo ""
            echo "已就绪的工具链:"
            rustc --version
            cargo --version
            rustup target list | grep riscv
            echo ""
            echo "快速开始:"
            echo "  make all     — 构建所有服务和内核"
            echo "  make test    — 运行测试"
            echo "  make run     — 在 QEMU 上运行"
            echo "=========================================="
