name: TrainOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build: compile kernel + all services ──────────────────────────────────
  build:
    name: Build (kernel + services)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: riscv64gc-unknown-none-elf
          components: rust-src, clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Build all services
        run: make services

      - name: Copy service ELFs
        run: make copy-elfs

      - name: Build kernel
        run: make kernel

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel
          path: target/riscv64gc-unknown-none-elf/release/kernel
          retention-days: 1

  # ── System Test: run on QEMU ─────────────────────────────────────────────
  test:
    name: System Test (QEMU)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install QEMU
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-system-riscv64

      - name: Download kernel artifact
        uses: actions/download-artifact@v4
        with:
          name: kernel
          path: target/riscv64gc-unknown-none-elf/release/

      - name: Make kernel executable
        run: chmod +x target/riscv64gc-unknown-none-elf/release/kernel

      - name: Run TrainOS on QEMU
        timeout-minutes: 2
        run: |
          timeout 30 qemu-system-riscv64 -machine virt -smp 2 -nographic \
            -bios rustsbi-qemu-new.bin \
            -kernel target/riscv64gc-unknown-none-elf/release/kernel \
            2>&1 | tee /tmp/trainos_output.log || true

      - name: Verify output
        run: |
          echo "=== TrainOS Output ==="
          cat /tmp/trainos_output.log
          echo ""
          echo "=== Test Results ==="
          if grep -q "TrainOS booting\|System ready\|READY" /tmp/trainos_output.log; then
            echo "PASS: System booted successfully"
          else
            echo "FAIL: System did not boot"
            exit 1
          fi
          if grep -q "ALL TESTS PASSED" /tmp/trainos_output.log; then
            echo "PASS: ALL TESTS PASSED"
          fi
          if grep -q "KERNEL PANIC" /tmp/trainos_output.log; then
            echo "FAIL: Kernel panic detected"
            exit 1
          else
            echo "PASS: No kernel panics"
          fi
